<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClearTone ShortForm</title>
    <meta name="description" content="여러 숏폼 영상과 제품 카드를 하나의 iframe으로 공유하는 ClearTone 페이지">
    <link rel="stylesheet" href="./css/styles.css?v=20260630-drag-only">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="ClearTone ShortForm">
        <span class="brand-mark"></span>
        <span>ClearTone ShortForm</span>
      </a>
      <nav class="nav-links" aria-label="주요 링크">
        <a href="./embed.html">iframe</a>
        <a href="./admin.html">admin</a>
        <a href="https://github.com/kshpartner/ClearToneShortForm" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">CLEAR TONE SHARE KIT</p>
          <h1>여러 숏폼을 하나의 iframe으로 공유하세요.</h1>
          <p>
            영상 임베드 주소와 제품 카드를 관리하면 외부 페이지에는 iframe 하나만 붙이면 됩니다.
            카드 추가, 삭제, 수정은 관리자 페이지에서 처리합니다.
          </p>
          <div class="hero-actions">
            <a class="button" href="./admin.html">관리자 열기</a>
            <a class="button secondary" href="./embed.html" target="_blank" rel="noopener">iframe 페이지 보기</a>
          </div>
        </div>
        <div class="hero-wide-preview" aria-label="iframe 미리보기">
          <iframe
            title="ClearTone 숏폼 iframe 미리보기"
            src="./embed.html?preview=1&v=20260630-drag-only"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
          </iframe>
        </div>
      </section>

      <section class="section embed-section" id="embed">
        <div class="section-heading">
          <p class="eyebrow">IFRAME CODE</p>
          <h2>외부에 붙일 단일 iframe</h2>
        </div>
        <div class="embed-tools">
          <label>
            너비
            <input id="embedWidth" type="text" value="100%">
          </label>
          <label>
            높이
            <input id="embedHeight" type="number" min="420" max="1400" step="10" value="720">
          </label>
          <button class="button" id="copyButton" type="button">코드 복사</button>
        </div>
        <textarea id="embedCode" readonly spellcheck="false" aria-label="iframe 코드"></textarea>
      </section>
    </main>

    <footer class="site-footer">
      <span>ClearTone ShortForm</span>
      <span>GitHub Pages iframe share kit</span>
    </footer>

    <script src="./js/app.js"></script>
  </body>
</html>
